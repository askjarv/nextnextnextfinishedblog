<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ stylesheet_path }}">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="site-header-topline">ACCESS LEVEL: SECURED</div>
      <div class="site-brand-row">
        <div>
          <h1><a href="{{ header_link }}">{{ site_title }}</a></h1>
          <p class="site-subtitle">{{ site_description }}</p>
        </div>
        <a class="rss-link" href="{{ rss_path }}" aria-label="RSS feed" title="RSS feed">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="6" cy="18" r="2.2"></circle>
            <path d="M4 10a10 10 0 0 1 10 10"></path>
            <path d="M4 4a16 16 0 0 1 16 16"></path>
          </svg>
        </a>
      </div>
    </header>

    <main>
      {{ post_list }}
      {{ pagination }}
    </main>
  </div>
</body>
</html>
